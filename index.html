<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>

<style>
    .carousel {
  position: relative;
  width: 300px;
  overflow: hidden;
  margin: auto;
}

.carousel-track {
  display: flex;
  transition: transform 0.5s ease;
}

.slide {
  min-width: 100%;
  height: 200px;
  background: lightblue;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
}

button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: black;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }
</style>

</head>

<body>

    <div class="carousel">
        <div class="carousel-track">
            <div class="slide">1</div>
            <div class="slide">2</div>
            <div class="slide">3</div>
        </div>

        <button class="prev">←</button>
        <button class="next">→</button>
    </div>

</body>

</html>
